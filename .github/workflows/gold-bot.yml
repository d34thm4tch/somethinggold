name: Gold Mean-Reversion Bot v1

on:
  schedule:
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'   # every 5 min, offset off :00/:15/:30/:45 to dodge GitHub's busiest scheduling slots
  workflow_dispatch:          # lets you trigger a manual test run from the GitHub Actions tab

permissions:
  contents: write             # needed so the workflow can commit the updated trade log

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot (single check-and-act cycle)
        env:
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
        run: python gold_mean_reversion_bot.py

      - name: Commit updated logs (if changed)
        run: |
          git config user.name "gold-bot"
          git config user.email "gold-bot@users.noreply.github.com"
          git add gold_trades_log.csv gold_bot_heartbeat.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update logs [skip ci]"
          git push
